# ===========================================
# ZeroReports - Production Docker Compose
# ===========================================

services:
  # ================================
  # Backend API (NestJS)
  # ================================
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: zeroreports-server
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - zeroreports-network

  # ================================
  # Frontend (Vite + Nginx)
  # ================================
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
    container_name: zeroreports-client
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - zeroreports-network

networks:
  zeroreports-network:
    driver: bridge
