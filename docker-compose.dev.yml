# Docker Compose для локальной разработки

services:
  # ================================
  # PostgreSQL
  # ================================
  postgres:
    image: postgres:16-alpine
    container_name: zeroreports-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: zeroreports
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CHANGE_ME_IN_PRODUCTION}
      POSTGRES_DB: zeroreports
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zeroreports"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zeroreports-network

  # ================================
  # Backend API (NestJS)
  # ================================
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: zeroreports-server-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DATABASE_URL=postgresql://zeroreports:${POSTGRES_PASSWORD:-CHANGE_ME_IN_PRODUCTION}@postgres:5432/zeroreports
      - CORS_ORIGINS=http://localhost:80,http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - zeroreports-network

  # ================================
  # Frontend (Vite + Nginx)
  # ================================
  client:
    build:
      context: .
      dockerfile: client/Dockerfile
      args:
        - VITE_API_URL=/api
        - VITE_MUI_LICENSE_KEY=${VITE_MUI_LICENSE_KEY}
    container_name: zeroreports-client-dev
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f -s http://127.0.0.1:80/ > /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - zeroreports-network

networks:
  zeroreports-network:
    driver: bridge

volumes:
  postgres_data:
