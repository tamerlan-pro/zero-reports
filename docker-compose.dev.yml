# Docker Compose для локальной разработки

services:
  # ================================
  # PostgreSQL
  # ================================
  postgres:
    image: postgres:16-alpine
    container_name: zeroreports-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: zeroreports
      POSTGRES_PASSWORD: zeroreports_secret
      POSTGRES_DB: zeroreports
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zeroreports"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zeroreports-network

  # ================================
  # Backend API (NestJS)
  # ================================
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: zeroreports-server-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DATABASE_URL=postgresql://zeroreports:zeroreports_secret@postgres:5432/zeroreports
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - zeroreports-network

  # ================================
  # Frontend (Vite + Nginx)
  # ================================
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
    container_name: zeroreports-client-dev
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - server
    networks:
      - zeroreports-network

networks:
  zeroreports-network:
    driver: bridge

volumes:
  postgres_data:
